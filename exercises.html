<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<style>
:root{--bg:#080b08;--bg2:#0d120d;--bg3:#111711;--green:#00ff41;--green2:#00cc33;--green3:#005918;--amber:#ffb000;--red:#ff3c3c;--blue:#5fafff;--dim:#0d130d;--border:#152115;--text:#c8ffc8;--muted:#3d6b3d;--white:#efffef;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);}
nav{height:50px;display:flex;align-items:center;padding:0 clamp(14px,3vw,48px);gap:24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'VT323',monospace;font-size:22px;color:var(--green);text-shadow:0 0 12px var(--green);letter-spacing:2px;text-decoration:none;}
.nav-logo span{color:var(--amber);}
.nav-links{display:flex;gap:20px;margin-left:auto;align-items:center;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:12px;font-family:'Share Tech Mono',monospace;letter-spacing:.05em;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--green);}
.nav-cta{padding:5px 14px;border:1px solid var(--green3);color:var(--green)!important;font-size:11px!important;text-transform:uppercase;letter-spacing:.1em;}
.nav-cta:hover{background:var(--green2);color:var(--bg)!important;border-color:var(--green2);}
.page-header{padding:52px clamp(20px,5vw,80px) 40px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.page-header::before{content:'';position:absolute;right:-100px;top:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,255,65,.05) 0%,transparent 70%);pointer-events:none;}
.header-tag{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--green2);margin-bottom:10px;}
.header-title{font-family:'VT323',monospace;font-size:clamp(36px,6vw,64px);color:var(--green);text-shadow:0 0 20px rgba(0,255,65,.3);line-height:1;margin-bottom:10px;}
.header-sub{font-size:14px;color:var(--muted);max-width:500px;line-height:1.7;}
.progress-bar-wrap{margin-top:28px;display:flex;align-items:center;gap:16px;}
.progress-track{flex:1;max-width:320px;height:6px;background:var(--border);position:relative;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);width:0%;transition:width .5s ease;box-shadow:0 0 8px var(--green3);}
.progress-label{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);}
#solved-count{color:var(--green);}
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 160px);}
.sidebar{border-right:1px solid var(--border);padding:16px 0;position:sticky;top:50px;height:calc(100vh - 50px);overflow-y:auto;}
.sidebar-section{padding:8px 16px 4px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:8px;}
.task-btn{width:100%;text-align:left;padding:10px 16px;background:transparent;border:none;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px;border-left:2px solid transparent;}
.task-btn:hover{background:rgba(0,255,65,.04);}
.task-btn.active{background:rgba(0,255,65,.08);border-left-color:var(--green);}
.task-btn.solved{border-left-color:var(--green2);}
.task-btn-num{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);min-width:20px;}
.task-btn-name{font-size:12px;color:var(--text);line-height:1.3;}
.task-btn-badge{margin-left:auto;font-size:10px;font-family:'Share Tech Mono',monospace;}
.badge-solved{color:var(--green2);}
.diff-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.diff-easy{background:#00cc33;}.diff-medium{background:#ffb000;}.diff-hard{background:#ff3c3c;}
.main-area{padding:28px clamp(20px,3vw,48px);display:flex;flex-direction:column;gap:20px;}
.task-card{background:var(--bg2);border:1px solid var(--border);animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.task-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.task-num{font-family:'VT323',monospace;font-size:22px;color:var(--green3);}
.task-title-text{font-size:16px;font-weight:600;color:var(--white);}
.diff-badge{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 8px;border:1px solid;letter-spacing:.1em;text-transform:uppercase;margin-left:auto;}
.diff-badge.easy{border-color:var(--green3);color:var(--green2);}
.diff-badge.medium{border-color:#7a5500;color:var(--amber);}
.diff-badge.hard{border-color:#7a1a1a;color:var(--red);}
.task-body{padding:18px;}
.task-description{font-size:14px;color:var(--text);line-height:1.75;margin-bottom:16px;}
.init-state{background:var(--bg3);border:1px solid var(--border);padding:12px 16px;margin-bottom:16px;font-family:'Share Tech Mono',monospace;font-size:12px;}
.init-state-title{color:var(--muted);font-size:10px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;}
.init-regs{display:flex;flex-wrap:wrap;gap:8px;}
.init-reg{background:var(--bg2);border:1px solid var(--border);padding:4px 10px;display:flex;gap:8px;align-items:center;}
.init-reg-name{color:var(--muted);font-size:10px;}
.init-reg-val{color:var(--amber);font-size:12px;}
.expected-box{background:rgba(0,255,65,.03);border:1px solid var(--green3);padding:12px 16px;margin-bottom:16px;font-family:'Share Tech Mono',monospace;font-size:12px;}
.expected-title{color:var(--green3);font-size:10px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;}
.expected-regs{display:flex;flex-wrap:wrap;gap:8px;}
.expected-reg{background:rgba(0,255,65,.06);border:1px solid var(--green3);padding:4px 10px;display:flex;gap:8px;align-items:center;}
.expected-reg-name{color:var(--muted);font-size:10px;}
.expected-reg-val{color:var(--green);font-size:12px;}
.editor-section{border:1px solid var(--border);}
.editor-header{padding:6px 12px;background:var(--dim);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.editor-wrap{display:flex;overflow:hidden;}
.line-nums{padding:10px 8px;color:var(--muted);text-align:right;background:var(--bg);border-right:1px solid var(--border);min-width:32px;font-family:'Share Tech Mono',monospace;font-size:12px;line-height:1.6;user-select:none;}
.line-nums .cur{color:var(--green);background:rgba(0,255,65,.1);}
textarea.ex-code{flex:1;background:var(--bg2);color:var(--text);border:none;outline:none;resize:none;padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:13px;line-height:1.6;caret-color:var(--green);tab-size:4;min-height:160px;}
textarea.ex-code::selection{background:rgba(0,255,65,.2);}
.ex-controls{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--bg2);}
button.ex-btn{background:transparent;border:1px solid var(--green3);color:var(--green);font-family:'Share Tech Mono',monospace;font-size:11px;padding:5px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;transition:all .1s;position:relative;overflow:hidden;}
button.ex-btn::before{content:'';position:absolute;inset:0;background:var(--green);opacity:0;transition:.1s;}
button.ex-btn:hover{border-color:var(--green);color:var(--bg);box-shadow:0 0 10px var(--green3);}
button.ex-btn:hover::before{opacity:1;}
button.ex-btn span{position:relative;z-index:1;}
button.ex-btn.check{border-color:var(--blue);color:var(--blue);}
button.ex-btn.check::before{background:var(--blue);}
button.ex-btn.check:hover{color:var(--bg);}
button.ex-btn.hint-btn{border-color:#7a5500;color:var(--amber);}
button.ex-btn.hint-btn::before{background:var(--amber);}
button.ex-btn.hint-btn:hover{color:var(--bg);}
.result-panel{padding:14px 18px;border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:12px;display:none;}
.result-panel.show{display:block;}
.result-ok{color:var(--green);}
.result-fail{color:var(--red);}
.result-line{margin-bottom:4px;}
.result-big{font-family:'VT323',monospace;font-size:32px;margin-bottom:8px;}
.result-reg-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.result-reg{padding:3px 8px;border:1px solid;font-size:11px;display:flex;gap:6px;}
.result-reg.match{border-color:var(--green3);color:var(--green2);}
.result-reg.mismatch{border-color:#7a1a1a;color:var(--red);}
.hint-box{background:rgba(255,176,0,.05);border:1px solid #7a5500;padding:12px 16px;margin-top:12px;font-size:13px;color:var(--amber);line-height:1.7;display:none;}
.hint-box.show{display:block;}
.next-wrap{padding:12px 18px;border-top:1px solid var(--border);display:none;}
.next-wrap.show{display:flex;gap:10px;align-items:center;}
button.next-btn{background:var(--green);color:var(--bg);border:none;font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px 20px;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;transition:all .15s;box-shadow:0 0 15px rgba(0,255,65,.25);}
button.next-btn:hover{background:var(--green2);box-shadow:0 0 25px rgba(0,255,65,.4);}
.congrats{display:none;text-align:center;padding:60px 20px;}
.congrats.show{display:block;}
.congrats-title{font-family:'VT323',monospace;font-size:72px;color:var(--green);text-shadow:0 0 30px rgba(0,255,65,.4);margin-bottom:12px;}
.congrats-sub{color:var(--muted);font-size:15px;margin-bottom:28px;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--green3);}
@media(max-width:700px){.layout{grid-template-columns:1fr;}.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:2px;padding:8px;}.task-btn{width:auto;padding:6px 12px;border:1px solid var(--border);border-left:2px solid transparent;}.task-btn-name{font-size:11px;}.sidebar-section{display:none;}}
</style>

<script>
const TASKS=[{id:1,title:'Присвоить значение',category:'Основы',difficulty:'easy',description:'Загрузи значение <b>42</b> в регистр <b>AX</b> и значение <b>7</b> в регистр <b>BX</b>.',initRegs:{},check:r=>r.AX===42&&r.BX===7,checkDesc:[{name:'AX',expected:42},{name:'BX',expected:7}],hint:'Используй инструкцию MOV. Например: MOV AX, 10 загружает число 10 в регистр AX.',starter:'; Загрузи 42 в AX и 7 в BX\n\n\nHLT'},{id:2,title:'Сложение',category:'Основы',difficulty:'easy',description:'В регистрах AX=10 и BX=25. Сложи их и сохрани результат в <b>CX</b>.',initRegs:{AX:10,BX:25},check:r=>r.CX===35,checkDesc:[{name:'CX',expected:35}],hint:'Сначала скопируй AX в CX через MOV CX, AX, затем сложи: ADD CX, BX.',starter:'; AX=10, BX=25 — сохрани сумму в CX\nMOV AX, 10\nMOV BX, 25\n\n\nHLT'},{id:3,title:'Обмен регистров',category:'Основы',difficulty:'easy',description:'В регистрах AX=5 и BX=99. Поменяй их значения местами: после выполнения AX должен быть 99, а BX — 5.',initRegs:{AX:5,BX:99},check:r=>r.AX===99&&r.BX===5,checkDesc:[{name:'AX',expected:99},{name:'BX',expected:5}],hint:'Нельзя просто MOV AX, BX — тогда потеряешь старое AX. Используй DX как временный регистр.',starter:'; AX=5, BX=99 — поменяй местами\nMOV AX, 5\nMOV BX, 99\n\n\nHLT'},{id:4,title:'Умножение',category:'Основы',difficulty:'easy',description:'Вычисли 6 × 7 и сохрани результат в <b>AX</b>.',initRegs:{},check:r=>r.AX===42,checkDesc:[{name:'AX',expected:42}],hint:'MUL умножает AX на операнд. Загрузи 6 в AX, потом: MOV BX, 7 / MUL BX.',starter:'; Вычисли 6 * 7, результат в AX\n\n\nHLT'},{id:5,title:'Максимум из двух',category:'Ветвления',difficulty:'medium',description:'В AX=15, BX=30. Найди большее из двух чисел и положи его в <b>CX</b>.',initRegs:{AX:15,BX:30},check:r=>r.CX===30,checkDesc:[{name:'CX',expected:30}],hint:'Используй CMP AX, BX чтобы сравнить, потом JG или JL для перехода. Не забудь метки (LABEL:).',starter:'; AX=15, BX=30 — положи максимум в CX\nMOV AX, 15\nMOV BX, 30\n\n\nHLT'},{id:6,title:'Сумма 1..10',category:'Циклы',difficulty:'medium',description:'Вычисли сумму чисел от 1 до 10 (1+2+...+10 = 55). Результат положи в <b>AX</b>.',initRegs:{},check:r=>r.AX===55,checkDesc:[{name:'AX',expected:55}],hint:'Используй LOOP. Загрузи в CX=10, в BX текущее число, в AX накапливай сумму. Внутри: INC BX, ADD AX, BX, LOOP метка.',starter:'; Сумма 1+2+...+10, результат в AX\n\n\nHLT'},{id:7,title:'Стек: сохрани и восстанови',category:'Стек',difficulty:'medium',description:'В AX=0x1234. Сохрани AX в стек, обнули AX (MOV AX, 0), затем восстанови оригинальное значение из стека обратно в AX.',initRegs:{AX:0x1234},check:r=>r.AX===0x1234,checkDesc:[{name:'AX',expected:0x1234}],hint:'PUSH AX — кладёт значение в стек. MOV AX, 0 — обнуляет. POP AX — достаёт обратно.',starter:'; AX=0x1234 — сохрани в стек, обнули, восстанови\nMOV AX, 0x1234\n\n\nHLT'},{id:8,title:'Вычти из 100',category:'Ветвления',difficulty:'medium',description:'В BX хранится число 37. Вычисли 100 - BX и положи результат в <b>AX</b>.',initRegs:{BX:37},check:r=>r.AX===63,checkDesc:[{name:'AX',expected:63}],hint:'Загрузи 100 в AX через MOV AX, 100, затем SUB AX, BX.',starter:'; BX=37 — вычисли 100-BX, результат в AX\nMOV BX, 37\n\n\nHLT'},{id:9,title:'Степень двойки',category:'Циклы',difficulty:'hard',description:'Вычисли 2^8 (два в степени восемь = 256). Результат сохрани в <b>AX</b>.',initRegs:{},check:r=>r.AX===256,checkDesc:[{name:'AX',expected:256}],hint:'Начни с AX=1. В цикле 8 раз умножай AX на 2: MOV BX, 2 / MUL BX. Используй CX=8 и LOOP.',starter:'; Вычисли 2^8, результат в AX\n\n\nHLT'},{id:10,title:'Факториал 5',category:'Циклы',difficulty:'hard',description:'Вычисли 5! (5 × 4 × 3 × 2 × 1 = 120). Результат сохрани в <b>AX</b>.',initRegs:{},check:r=>r.AX===120,checkDesc:[{name:'AX',expected:120}],hint:'Начни с AX=1, CX=5. В цикле: MUL CX (AX *= CX), потом DEC CX и повтори пока CX > 0. Или используй LOOP с BX как счётчик множителя.',starter:'; Вычисли 5!, результат в AX\n\n\nHLT'}];

const REGS_LIST=['AX','BX','CX','DX','SI','DI','SP','BP'];
function runCode(src,initRegs){
  const state={regs:{AX:0,BX:0,CX:0,DX:0,SI:0,DI:0,SP:0xFFFF,BP:0,...initRegs},flags:{ZF:0,SF:0,CF:0,OF:0},memory:new Array(32).fill(0),stack:[],ip:0,halted:false,cycles:0,labels:{},instructions:[]};
  const{instructions,labels}=parseCode(src);state.instructions=instructions;state.labels=labels;
  let max=5000;
  while(!state.halted&&state.ip<state.instructions.length&&max-->0){const r=execInstruction(state.instructions[state.ip],state);if(!r.ok)return{ok:false,error:r.log,regs:state.regs};}
  return{ok:true,regs:state.regs};
}
function parseCode(src){const lines=src.split('\n'),instructions=[],labels={};lines.forEach((line,idx)=>{const s=line.replace(/;.*$/,'').trim();if(!s){instructions.push({type:'EMPTY',src:line,lineIdx:idx});return;}const lm=s.match(/^([A-Za-z_]\w*)\s*:(.*)$/);if(lm){const n=lm[1].toUpperCase(),rest=lm[2].trim();labels[n]=instructions.length;if(rest){const p=pi(rest,idx);if(p){p.src=line;instructions.push(p);}else instructions.push({type:'EMPTY',src:line,lineIdx:idx});}else instructions.push({type:'LABEL',name:n,src:line,lineIdx:idx});return;}const p=pi(s,idx);if(p){p.src=line;instructions.push(p);}else instructions.push({type:'UNKNOWN',src:s,lineIdx:idx});});return{instructions,labels};}
function pi(s,idx){const p=s.split(/[\s,]+/).filter(Boolean);if(!p.length)return null;return{type:p[0].toUpperCase(),args:p.slice(1).map(a=>a.toUpperCase()),lineIdx:idx};}
function rv(arg,r){if(!arg)return 0;if(REGS_LIST.includes(arg))return r[arg]&0xFFFF;if(arg.startsWith('0X'))return parseInt(arg,16)&0xFFFF;const n=parseInt(arg);if(!isNaN(n))return((n%65536)+65536)%65536;return 0;}
function uf(res,s){const r=((res%65536)+65536)%65536;s.flags.ZF=r===0?1:0;s.flags.SF=(r&0x8000)?1:0;s.flags.CF=(res<0||res>0xFFFF)?1:0;s.flags.OF=(res>32767||res<-32768)?1:0;}
function execInstruction(instr,s){const{type,args}=instr,r=s.regs,f=s.flags;let adv=true;
switch(type){case'EMPTY':case'LABEL':case'NOP':break;case'UNKNOWN':return{ok:false,log:`Неизвестная: ${instr.src}`};
case'MOV':{const v=rv(args[1],r);if(REGS_LIST.includes(args[0]))r[args[0]]=v&0xFFFF;else return{ok:false,log:'MOV: неверный операнд'};break;}
case'ADD':{const res=rv(args[0],r)+rv(args[1],r);r[args[0]]=res&0xFFFF;uf(res,s);break;}
case'SUB':{const res=rv(args[0],r)-rv(args[1],r);r[args[0]]=((res%65536)+65536)%65536;uf(res,s);break;}
case'INC':{const res=rv(args[0],r)+1;r[args[0]]=res&0xFFFF;uf(res,s);break;}
case'DEC':{const res=rv(args[0],r)-1;r[args[0]]=((res%65536)+65536)%65536;uf(res,s);break;}
case'MUL':{const b=rv(args[0],r),res=(r.AX*b)&0xFFFFFFFF;r.AX=res&0xFFFF;r.DX=(res>>16)&0xFFFF;f.CF=f.OF=r.DX!==0?1:0;break;}
case'DIV':{const b=rv(args[0],r);if(!b)return{ok:false,log:'DIV: на ноль'};const d=(r.DX<<16)|r.AX;r.AX=Math.floor(d/b)&0xFFFF;r.DX=d%b;break;}
case'PUSH':{const v=rv(args[0],r);s.stack.push(v);r.SP=Math.max(0,r.SP-2);break;}
case'POP':{if(!s.stack.length)return{ok:false,log:'POP: стек пуст'};const v=s.stack.pop();if(REGS_LIST.includes(args[0]))r[args[0]]=v&0xFFFF;r.SP=Math.min(0xFFFF,r.SP+2);break;}
case'CMP':{uf(rv(args[0],r)-rv(args[1],r),s);break;}
case'JMP':{if(s.labels[args[0]]!==undefined){s.ip=s.labels[args[0]];adv=false;}else return{ok:false,log:'JMP: метка не найдена'};break;}
case'JE':case'JZ':{if(f.ZF){if(s.labels[args[0]]!==undefined){s.ip=s.labels[args[0]];adv=false;}else return{ok:false,log:'JE: метка не найдена'};} break;}
case'JNE':case'JNZ':{if(!f.ZF){if(s.labels[args[0]]!==undefined){s.ip=s.labels[args[0]];adv=false;}else return{ok:false,log:'JNE: метка не найдена'};} break;}
case'JL':case'JNGE':{if(f.SF!==f.OF){if(s.labels[args[0]]!==undefined){s.ip=s.labels[args[0]];adv=false;}else return{ok:false,log:'JL: метка не найдена'};} break;}
case'JG':case'JNLE':{if(!f.ZF&&f.SF===f.OF){if(s.labels[args[0]]!==undefined){s.ip=s.labels[args[0]];adv=false;}else return{ok:false,log:'JG: метка не найдена'};} break;}
case'LOOP':{r.CX=(r.CX-1+65536)%65536;if(r.CX!==0){if(s.labels[args[0]]!==undefined){s.ip=s.labels[args[0]];adv=false;}else return{ok:false,log:'LOOP: метка не найдена'};} break;}
case'HLT':s.halted=true;break;
default:return{ok:false,log:`Неизвестная: ${type}`};}
if(adv)s.ip++;s.cycles++;return{ok:true};}
function toHex(v){return'0x'+((v&0xFFFF)>>>0).toString(16).toUpperCase().padStart(4,'0');}

let currentTask=0;
const solved=new Set(JSON.parse(localStorage.getItem('x86_solved')||'[]'));
function saveSolved(){localStorage.setItem('x86_solved',JSON.stringify([...solved]));}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  const cats=[...new Set(TASKS.map(t=>t.category))];
  let html='';
  cats.forEach(cat=>{
    html+=`<div class="sidebar-section">${cat}</div>`;
    TASKS.filter(t=>t.category===cat).forEach(t=>{
      const idx=TASKS.indexOf(t),isSolved=solved.has(t.id),isActive=currentTask===idx;
      html+=`<button class="task-btn ${isActive?'active':''} ${isSolved?'solved':''}" onclick="loadTask(${idx})">
        <span class="diff-dot diff-${t.difficulty}"></span>
        <span class="task-btn-num">${String(t.id).padStart(2,'0')}</span>
        <span class="task-btn-name">${t.title}</span>
        <span class="task-btn-badge ${isSolved?'badge-solved':''}">${isSolved?'✓':''}</span>
      </button>`;
    });
  });
  sb.innerHTML=html;
}

function renderTask(idx){
  const t=TASKS[idx];
  const main=document.getElementById('main-area');
  const initHtml=Object.keys(t.initRegs).length?`<div class="init-state"><div class="init-state-title">Начальное состояние регистров</div><div class="init-regs">${Object.entries(t.initRegs).map(([k,v])=>`<div class="init-reg"><span class="init-reg-name">${k}</span><span class="init-reg-val">${toHex(v)}</span></div>`).join('')}</div></div>`:'';
  const expHtml=`<div class="expected-box"><div class="expected-title">Ожидаемый результат</div><div class="expected-regs">${t.checkDesc.map(c=>`<div class="expected-reg"><span class="expected-reg-name">${c.name}</span><span class="expected-reg-val">${toHex(c.expected)}</span></div>`).join('')}</div></div>`;
  main.innerHTML=`<div class="task-card">
    <div class="task-card-header">
      <span class="task-num">#${String(t.id).padStart(2,'0')}</span>
      <span class="task-title-text">${t.title}</span>
      <span class="diff-badge ${t.difficulty}">${{easy:'Лёгкий',medium:'Средний',hard:'Сложный'}[t.difficulty]}</span>
    </div>
    <div class="task-body">
      <div class="task-description">${t.description}</div>
      ${initHtml}${expHtml}
      <div class="editor-section">
        <div class="editor-header"><span style="color:var(--green3)">▶</span> КОД</div>
        <div class="editor-wrap">
          <div class="line-nums" id="lnums">1</div>
          <textarea class="ex-code" id="ex-code" spellcheck="false" oninput="updateLnums()" onkeydown="handleTabEx(event)">${t.starter}</textarea>
        </div>
        <div class="ex-controls">
          <button class="ex-btn check" onclick="checkTask(${idx})"><span>✓ Проверить</span></button>
          <button class="ex-btn" onclick="resetTaskCode(${idx})"><span>↺ Сброс</span></button>
          <button class="ex-btn hint-btn" onclick="toggleHint()"><span>? Подсказка</span></button>
        </div>
      </div>
      <div class="hint-box" id="hint-box">💡 ${t.hint}</div>
    </div>
    <div class="result-panel" id="result-panel"></div>
    <div class="next-wrap" id="next-wrap">
      ${idx<TASKS.length-1?`<button class="next-btn" onclick="loadTask(${idx+1})">Следующая задача →</button>`:''}
      <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)">Задача решена ✓</span>
    </div>
  </div>
  <div class="congrats" id="congrats">
    <div class="congrats-title">ALL DONE!</div>
    <div class="congrats-sub">Ты решил все ${TASKS.length} задач. Настоящий ассемблерщик 🎖️</div>
    <a href="simulator.html" style="display:inline-block;padding:12px 28px;background:var(--green);color:var(--bg);font-family:'Share Tech Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:.1em;text-decoration:none;">▶ Открыть симулятор</a>
  </div>`;
  updateLnums();
  if(solved.has(t.id))showResult(idx,true,null);
}

function updateLnums(){const ta=document.getElementById('ex-code');if(!ta)return;const ln=document.getElementById('lnums');ln.innerHTML=ta.value.split('\n').map((_,i)=>`<div>${i+1}</div>`).join('');}
function handleTabEx(e){if(e.key!=='Tab')return;e.preventDefault();const ta=e.target,s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'    '+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+4;updateLnums();}
function resetTaskCode(idx){const ta=document.getElementById('ex-code');if(ta){ta.value=TASKS[idx].starter;updateLnums();}document.getElementById('result-panel').className='result-panel';document.getElementById('next-wrap').className='next-wrap';document.getElementById('hint-box').className='hint-box';}
function toggleHint(){document.getElementById('hint-box').classList.toggle('show');}

function checkTask(idx){
  const t=TASKS[idx],code=document.getElementById('ex-code').value;
  const result=runCode(code,{...t.initRegs});
  if(!result.ok){showResult(idx,false,`Ошибка: ${result.error}`);return;}
  const passed=t.check(result.regs);
  if(passed&&!solved.has(t.id)){solved.add(t.id);saveSolved();updateProgress();renderSidebar();}
  showResult(idx,passed,null);
}

function showResult(idx,passed,error){
  const t=TASKS[idx],rp=document.getElementById('result-panel'),nw=document.getElementById('next-wrap');
  if(!rp)return;
  if(error){rp.innerHTML=`<div class="result-fail"><div class="result-big">✕ ОШИБКА</div><div class="result-line">${error}</div></div>`;rp.className='result-panel show';return;}
  const code=document.getElementById('ex-code')?.value||t.starter;
  const run=runCode(code,{...t.initRegs});
  const regs=run.ok?run.regs:{};
  const regsHtml=t.checkDesc.map(c=>{const actual=regs[c.name]??0,match=actual===c.expected;return`<div class="result-reg ${match?'match':'mismatch'}"><span>${c.name}</span><span>получено: ${toHex(actual)}</span><span>ожидалось: ${toHex(c.expected)}</span><span>${match?'✓':'✗'}</span></div>`;}).join('');
  if(passed){
    rp.innerHTML=`<div class="result-ok"><div class="result-big">✓ ВЕРНО!</div><div class="result-line" style="color:var(--muted);margin-bottom:8px">Все регистры совпадают</div><div class="result-reg-row">${regsHtml}</div></div>`;
    nw.className='next-wrap show';
    if(idx===TASKS.length-1&&solved.size===TASKS.length)document.getElementById('congrats').className='congrats show';
  }else{
    rp.innerHTML=`<div class="result-fail"><div class="result-big">✗ НЕ ВЕРНО</div><div class="result-line" style="color:var(--muted);margin-bottom:8px">Проверь регистры:</div><div class="result-reg-row">${regsHtml}</div></div>`;
  }
  rp.className='result-panel show';
}

function loadTask(idx){currentTask=idx;renderSidebar();renderTask(idx);window.scrollTo({top:0,behavior:'smooth'});}
function updateProgress(){const total=TASKS.length,done=solved.size;document.getElementById('solved-count').textContent=done;document.getElementById('total-count').textContent=total;document.getElementById('progress-fill').style.width=(done/total*100)+'%';}

document.getElementById('total-count').textContent=TASKS.length;
updateProgress();renderSidebar();loadTask(0);
</script>
</body>
</html>
